name: Frontend Safety Check

on:
  push:
    branches: [ "main" ]

jobs:
  check-code:
    runs-on: ubuntu-latest

    steps:
      - name: Step 1 - Download our code from GitHub
        uses: actions/checkout@v3

      - name: Step 2 - Install Node.js (The Engine)
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Step 3 - Go into Frontend and install tools
        working-directory: ./frontend
        run: npm install

      # 🔥 FIX: Agar local script binding break kare, toh npx runtime architecture download override forced chalayein
      - name: Step 4 - Run ESLint via Runtime Binary
        working-directory: ./frontend
        run: npx oxlint